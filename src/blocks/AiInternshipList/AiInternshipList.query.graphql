#import '@blocks/AiInternshipList/AiInternshipListItem.fragment.graphql'

query AiInternshipList(
  $first: IntType!
  $skip: IntType!
  $filter: AiInternshipModelFilter
) {
  itemsMeta: _allAiInternshipsMeta(filter: $filter) {
    count
  }
  items: allAiInternships(first: $first, skip: $skip, filter: $filter) {
    ...AiInternshipItem
  }
}
